version: 2
updates:
  # Maintain dependencies for GitHub Actions
  # "/" only covers .github/workflows; the composite actions' pins live in
  # .github/actions/*/action.yml and need their own directory entries.
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: pre-commit
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
