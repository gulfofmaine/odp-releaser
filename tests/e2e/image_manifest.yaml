# Image manifest config for the e2e jobs in .github/workflows/ci.yml.
#
# `bump-images` runs against this file with --dry-run and a client_payload
# generated by `odp-releaser test make-payload` (a workflow_dispatch event
# from this repo). The two images cover both update modes and both kustomize
# pin styles; their placeholder tag/digest always differ from the generated
# payload's, so `changed` is always "true".
allowed_source_repos:
  - gulfofmaine/odp-releaser
images:
  ghcr.io/gulfofmaine/odp-releaser-e2e-commit:
    - events:
        - workflow_dispatch
      kustomize_manifests:
        - path: ./manifests/commit.kustomization.yaml
  ghcr.io/gulfofmaine/odp-releaser-e2e-pr:
    - events:
        - workflow_dispatch
      update_mode: pull_request
      kustomize_manifests:
        - path: ./manifests/pr.kustomization.yaml
          pin: digest
